name: Docker Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64
          load: true
          tags: track1-agent:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image size
        run: |
          docker images track1-agent:latest
          echo "Image size:"
          docker images track1-agent:latest --format "{{.Size}}"

      - name: Run agent with test tasks
        run: |
          mkdir -p output
          docker run --rm \
            -e FIREWORKS_API_KEY="${{ secrets.FIREWORKS_API_KEY }}" \
            -e FIREWORKS_BASE_URL="https://api.fireworks.ai/inference/v1" \
            -e ALLOWED_MODELS="minimax-m3,kimi-k2p7-code,gemma-4-31b-it,gemma-4-26b-a4b-it,gemma-4-31b-it-nvfp4" \
            -v ${{ github.workspace }}/input:/input \
            -v ${{ github.workspace }}/output:/output \
            track1-agent:latest

      - name: Validate output
        run: |
          echo "=== Output ==="
          cat output/results.json | python3 -m json.tool
          echo ""
          echo "=== Validation ==="
          python3 -c "
          import json
          with open('output/results.json') as f:
              results = json.load(f)
          assert isinstance(results, list), 'Output must be a list'
          assert len(results) > 0, 'Must have at least 1 result'
          for r in results:
              assert 'task_id' in r, f'Missing task_id in {r}'
              assert 'answer' in r, f'Missing answer in {r}'
              assert isinstance(r['answer'], str), f'answer must be string in {r}'
              assert len(r['answer']) > 0, f'answer must not be empty in {r}'
          print(f'✅ Valid: {len(results)} tasks processed successfully')
          "

      - name: Check exit code
        run: |
          echo "Build and test completed with exit code 0"
